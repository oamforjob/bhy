<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ใบสรุปราคา</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary-color: #2d3436;
  --accent-color: #e67e22;
  --bg-color: #f0f2f5;
  --card-bg: #ffffff;
  --text-main: #2d3436;
  --text-sub: #636e72;
}

body {
  font-family: 'Prompt', sans-serif;
  background: var(--bg-color);
  margin: 0;
  padding: 15px;
  color: var(--text-main);
}

.container {
  max-width: 550px;
  margin: 0 auto;
  background: var(--card-bg);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

h2 { text-align: center; margin-top: 0; color: var(--primary-color); font-weight: 600; }

.section-title {
  font-size: 14px;
  color: var(--accent-color);
  font-weight: 600;
  margin: 20px 0 10px 0;
  text-transform: uppercase;
  border-bottom: 2px solid #f1f2f6;
  padding-bottom: 5px;
}

.form-group { margin-bottom: 15px; }
label { display: block; font-size: 13px; margin-bottom: 5px; color: var(--text-sub); }

input, select {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #dfe6e9;
  font-family: 'Prompt', sans-serif;
  font-size: 14px;
  box-sizing: border-box;
}

.row { display: flex; gap: 10px; }

/* Material Selector */
.material-group { display: flex; gap: 10px; margin-bottom: 15px; }
.material-btn {
  flex: 1; padding: 10px; text-align: center; background: #f8f9fa;
  border: 1px solid #eee; border-radius: 10px; cursor: pointer; font-size: 14px; transition: 0.2s;
}
.material-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }

/* ปรับปรุง Options Grid ให้คอลัมน์เสมอกัน */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.opt {
  display: grid;
  grid-template-columns: 25px 1fr 65px; /* ติ๊ก | ชื่อ | ราคา */
  align-items: center;
  background: #f8f9fa;
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid #eee;
  cursor: pointer;
  transition: 0.2s;
}

.opt.active { background: rgba(230, 126, 34, 0.08); border-color: var(--accent-color); }

.opt span { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.opt input[type="number"] {
  height: 28px;
  padding: 2px 5px;
  font-size: 12px;
  text-align: right;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* Action Buttons */
.button-group { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
button.main-btn {
  width: 100%; cursor: pointer; padding: 12px; border-radius: 12px;
  font-family: 'Prompt', sans-serif; font-size: 16px; font-weight: 600; border: none;
}
.btn-generate { background: var(--primary-color); color: #fff; }
.btn-download { background: transparent; color: var(--primary-color); border: 2px solid var(--primary-color) !important; }

#canvas-wrapper {
  margin-top: 25px; background: #fdfdfd; padding: 10px;
  border-radius: 15px; border: 1px dashed #ccc;
}
canvas { max-width: 100%; height: auto; display: block; margin: 0 auto; }
</style>
</head>

<body>

<div class="container">
  <h2>ใบแจ้งราคา OHM SNR</h2>
  
  <div class="section-title">1. ประเภทวัสดุ</div>
  <div class="material-group" id="materialGroup">
    <div class="material-btn active" onclick="setMaterial(this, 'ไวนิล')">ไวนิล</div>
    <div class="material-btn" onclick="setMaterial(this, 'สติ๊กเกอร์')">สติ๊กเกอร์</div>
    <div class="material-btn" onclick="setMaterial(this, 'กระดาษ')">กระดาษ</div>
  </div>

  <div class="section-title">2. ขนาดและราคา</div>
  <div class="form-group">
    <div class="row">
      <div style="flex:2">
        <label>กว้าง x สูง</label>
        <div class="row">
          <input type="number" id="width" placeholder="กว้าง" value="3">
          <input type="number" id="height" placeholder="สูง" value="5">
        </div>
      </div>
      <div style="flex:1">
        <label>หน่วย</label>
        <select id="unit">
          <option value="m">เมตร (m)</option>
          <option value="cm">ซม. (cm)</option>
          <option value="mm">มม. (mm)</option>
        </select>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="form-group" style="flex:1">
      <label>ราคา/ตร.ม.</label>
      <input type="number" id="price" value="150">
    </div>
    <div class="form-group" style="flex:1">
      <label>ค่าส่ง (0 = ฟรี)</label>
      <input type="number" id="shipping" value="0">
    </div>
    <div class="form-group" style="flex:1">
      <label>ส่วนลด</label>
      <input type="number" id="discount" value="0">
    </div>
  </div>

  <div class="section-title">3. ตัวเลือกเพิ่มเติม</div>
  <div class="options-grid">
    <div class="opt active" onclick="toggleOpt(this)">
      <input type="checkbox" id="opt1" checked> <span>เจาะตาไก่ฟรี</span> 
      <input type="number" id="p1" value="0" onclick="event.stopPropagation()">
    </div>
    <div class="opt" onclick="toggleOpt(this)">
      <input type="checkbox" id="opt2"> <span>พิมพ์ 2 ด้าน</span> 
      <input type="number" id="p2" value="0" onclick="event.stopPropagation()">
    </div>
    <div class="opt" onclick="toggleOpt(this)">
      <input type="checkbox" id="opt3"> <span>ธงญี่ปุ่น</span> 
      <input type="number" id="p3" value="0" onclick="event.stopPropagation()">
    </div>
    <div class="opt" onclick="toggleOpt(this)">
      <input type="checkbox" id="opt4"> <span>โครงเหล็ก</span> 
      <input type="number" id="p4" value="0" onclick="event.stopPropagation()">
    </div>
    <div class="opt" onclick="toggleOpt(this)">
      <input type="checkbox" id="opt5"> <span>เคลือบเงา</span> 
      <input type="number" id="p5" value="0" onclick="event.stopPropagation()">
    </div>
    <div class="opt" onclick="toggleOpt(this)">
      <input type="checkbox" id="opt6"> <span>ติดตั้ง</span> 
      <input type="number" id="p6" value="0" onclick="event.stopPropagation()">
    </div>
  </div>

  <div class="button-group">
    <button class="main-btn btn-generate" onclick="drawAll()">สร้างภาพสรุปราคา</button>
    <button class="main-btn btn-download" onclick="downloadImage()">บันทึกเป็นรูปภาพ</button>
  </div>

  <div id="canvas-wrapper">
    <canvas id="canvas" width="600" height="800"></canvas>
  </div>
</div>

<script>
let selectedMaterial = "ไวนิล";

function setMaterial(el, val) {
  document.querySelectorAll('.material-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');
  selectedMaterial = val;
  drawAll();
}

function toggleOpt(el) {
  const cb = el.querySelector('input[type="checkbox"]');
  if (event.target !== cb) cb.checked = !cb.checked;
  cb.checked ? el.classList.add('active') : el.classList.remove('active');
  drawAll();
}

function drawWatermark(ctx) {
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.font = 'bold 30px Prompt';
  ctx.fillStyle = '#000';
  ctx.rotate(-45 * Math.PI / 180);
  for (let i = -1000; i < 1000; i += 180) {
    for (let j = -1000; j < 1000; j += 100) {
      ctx.fillText('OHM SNR', i, j);
    }
  }
  ctx.restore();
}

function drawArrow(ctx, x1, y1, x2, y2) {
  const headlen = 10;
  const angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 6), y2 - headlen * Math.sin(angle - Math.PI / 6));
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 6), y2 - headlen * Math.sin(angle + Math.PI / 6));
  ctx.stroke();
}

function drawMeasure(ctx, w, h, x, y, realW, realH, unit) {
  ctx.fillStyle = '#ffb347';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#2d3436';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x, y, w, h);

  ctx.fillStyle = '#000';
  ctx.font = '16px Prompt';
  ctx.textAlign = 'center';

  const pad = 40;
  ctx.strokeStyle = '#000';
  drawArrow(ctx, x + w, y + h + pad, x, y + h + pad); 
  drawArrow(ctx, x, y + h + pad, x + w, y + h + pad); 
  ctx.fillText(`${realW} ${unit}`, x + w / 2, y + h + pad + 25);

  ctx.save();
  ctx.translate(x - pad, y + h / 2);
  ctx.rotate(-Math.PI / 2);
  drawArrow(ctx, h/2, 0, -h/2, 0); 
  drawArrow(ctx, -h/2, 0, h/2, 0); 
  ctx.fillText(`${realH} ${unit}`, 0, -15);
  ctx.restore();
}

function drawAll() {
  const wIn = +document.getElementById('width').value;
  const hIn = +document.getElementById('height').value;
  const unitVal = document.getElementById('unit').value;
  const priceVal = +document.getElementById('price').value;
  const shipVal = +document.getElementById('shipping').value || 0;
  const discVal = +document.getElementById('discount').value || 0;

  if (!wIn || !hIn) return;

  let optTotal = 0;
  let optLabels = [];
  for(let i=1; i<=6; i++) {
    const cb = document.getElementById('opt'+i);
    if(cb.checked) {
      const p = +document.getElementById('p'+i).value;
      optTotal += p;
      optLabels.push(cb.nextElementSibling.innerText);
    }
  }

  const wM = (unitVal === 'cm') ? wIn/100 : (unitVal === 'mm') ? wIn/1000 : wIn;
  const hM = (unitVal === 'cm') ? hIn/100 : (unitVal === 'mm') ? hIn/1000 : hIn;
  const area = wM * hM;
  const subtotal = area * priceVal;
  const total = subtotal + shipVal + optTotal - discVal;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, 600, 800);

  drawWatermark(ctx);

  ctx.fillStyle = '#2d3436';
  ctx.font = 'bold 26px Prompt';
  ctx.textAlign = 'center';
  ctx.fillText('ใบสรุปราคา/ชิ้น', 300, 50);
  ctx.font = '16px Prompt';
  ctx.fillText(`วัสดุ: ${selectedMaterial}`, 300, 80);

  const maxDraw = 250;
  const ratio = maxDraw / Math.max(wM, hM);
  drawMeasure(ctx, wM*ratio, hM*ratio, (600 - wM*ratio)/2 + 20, 140, wIn, hIn, unitVal);

  let y = 500;
  ctx.textAlign = 'left';
  ctx.font = '16px Prompt';
  ctx.fillStyle = '#636e72';
  ctx.fillText(`คำนวณพื้นที่: ${area.toFixed(2)} ตร.ม.`, 70, y);
  
  ctx.fillStyle = '#2d3436';
  ctx.fillText(`ค่าวัสดุ (${selectedMaterial}):`, 70, y+35);
  ctx.textAlign = 'right';
  ctx.fillText(`${subtotal.toLocaleString(undefined,{minimumFractionDigits:2})} บาท`, 530, y+35);

  ctx.textAlign = 'left';
  ctx.fillText(`ตัวเลือกเสริม: ${optLabels.length > 0 ? optLabels.join(', ') : '-'}`, 70, y+70);
  ctx.textAlign = 'right';
  ctx.fillText(`+ ${optTotal.toLocaleString()} บาท`, 530, y+70);

  ctx.textAlign = 'left';
  ctx.fillText(`ค่าจัดส่ง:`, 70, y+105);
  ctx.textAlign = 'right';
  ctx.fillText(shipVal === 0 ? "ฟรี" : `+ ${shipVal.toLocaleString()} บาท`, 530, y+105);

  ctx.textAlign = 'left';
  ctx.fillStyle = '#e17055';
  ctx.fillText(`ส่วนลด:`, 70, y+140);
  ctx.textAlign = 'right';
  ctx.fillText(`- ${discVal.toLocaleString()} บาท`, 530, y+140);

  ctx.fillStyle = '#2d3436';
  ctx.fillRect(50, y+175, 500, 65);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 24px Prompt';
  ctx.textAlign = 'left';
  ctx.fillText('ยอดรวมสุทธิ', 80, y+217);
  ctx.textAlign = 'right';
  ctx.fillText(`${total.toLocaleString()} บาท`, 520, y+217);
}

function downloadImage() {
  const link = document.createElement('a');
  link.download = `quote-ohm-snr.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

window.onload = drawAll;
</script>

</body>
</html>
