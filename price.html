<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เครื่องมือคำนวณขนาดและราคา</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  body {font-family:'Prompt',sans-serif;background:linear-gradient(135deg,#ff9800,#ffc107);margin:0;padding:10px;}
  .container {max-width:500px;margin:auto;background:#fff;padding:15px;border-radius:14px;box-shadow:0 8px 20px rgba(0,0,0,0.2);} 
  h2{text-align:center;font-size:18px;}

  .form-group{margin-bottom:12px;}
  label{font-size:13px;margin-bottom:4px;display:block;}

  input,select{
    width:100%;padding:12px;border-radius:10px;border:1px solid #ddd;
    font-size:15px;box-sizing:border-box;
  }

  .row{display:flex;gap:10px;}
  .row>div{flex:1;}

  button{width:100%;background:#ff9800;color:#fff;border:none;padding:12px;border-radius:10px;margin-top:8px;font-weight:600;font-size:15px;}

  canvas{width:100%;margin-top:15px;border-radius:10px;border:1px solid #eee;}

  .result{margin-top:8px;font-size:14px;}
</style>
</head>
<body>
<div class="container">
<h2>คำนวณขนาด + ราคา</h2>

<div class="form-group">
<label>ขนาด (กว้าง x สูง)</label>
<div class="row">
<div><input type="number" id="width" placeholder="กว้าง"></div>
<div><input type="number" id="height" placeholder="สูง"></div>
</div>
</div>

<div class="form-group">
<label>หน่วย</label>
<select id="unit">
<option value="m">เมตร</option>
<option value="cm">เซนติเมตร</option>
<option value="mm">มิลลิเมตร</option>
</select>
</div>

<div class="form-group">
<label>ราคา / ตร.ม.</label>
<input type="number" id="price" placeholder="บาท">
</div>

<button onclick="drawShape()">คำนวณ</button>
<button onclick="saveImage()">บันทึกเป็นรูป</button>
<button onclick="shareLine()">แชร์เข้า LINE</button>

<div class="result" id="area"></div>
<div class="result" id="total"></div>

<canvas id="canvas" width="600" height="400"></canvas>
</div>

<script>
function convertToMeters(value, unit) {
  if (unit==='cm') return value/100;
  if (unit==='mm') return value/1000;
  return value;
}

function drawGrid(ctx,w,h){
 ctx.strokeStyle='#eee';
 for(let x=0;x<w;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
 for(let y=0;y<h;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
}

function drawWatermark(ctx, canvas) {
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#000';
  ctx.font = '20px Prompt';

  ctx.translate(canvas.width/2, canvas.height/2);
  ctx.rotate(-Math.PI / 4);

  for (let y = -canvas.height; y < canvas.height; y += 80) {
    for (let x = -canvas.width; x < canvas.width; x += 200) {
      ctx.fillText('Oam snr', x, y);
    }
  }

  ctx.restore();
}

function drawShape(){
 const wInput=parseFloat(width.value);
 const hInput=parseFloat(height.value);
 const priceVal=parseFloat(price.value);
 const unitVal=unit.value;
 if(!wInput||!hInput||!priceVal){alert('กรุณากรอกข้อมูลให้ครบ');return;}

 const w=convertToMeters(wInput,unitVal);
 const h=convertToMeters(hInput,unitVal);

 const canvas=document.getElementById('canvas');
 const ctx=canvas.getContext('2d');
 ctx.clearRect(0,0,canvas.width,canvas.height);

 drawGrid(ctx,canvas.width,canvas.height);
 drawWatermark(ctx, canvas);

 const scale=Math.min(400/w,250/h);
 const drawW=w*scale;
 const drawH=h*scale;
 const startX=(canvas.width-drawW)/2;
 const startY=(canvas.height-drawH)/2;

 ctx.fillStyle='rgba(255,152,0,0.6)';
 ctx.fillRect(startX,startY,drawW,drawH);
 ctx.strokeStyle='#ff9800';ctx.lineWidth=2;
 ctx.strokeRect(startX,startY,drawW,drawH);

 const area=w*h;
 const total=area*priceVal;

 ctx.fillStyle='#000';ctx.font='14px Prompt';

 // เส้นวัดกว้าง + tick
 ctx.beginPath();
 ctx.moveTo(startX, startY + drawH + 20);
 ctx.lineTo(startX + drawW, startY + drawH + 20);
 ctx.stroke();
 for (let i = 0; i <= 10; i++) {
   let x = startX + (drawW/10)*i;
   ctx.beginPath();
   ctx.moveTo(x, startY + drawH + 15);
   ctx.lineTo(x, startY + drawH + 25);
   ctx.stroke();
 }
 ctx.fillText(wInput + ' ' + unitVal,startX + drawW/2 - 30,startY + drawH + 40);

 // เส้นวัดสูง + tick
 ctx.beginPath();
 ctx.moveTo(startX - 20, startY);
 ctx.lineTo(startX - 20, startY + drawH);
 ctx.stroke();
 for (let i = 0; i <= 10; i++) {
   let y = startY + (drawH/10)*i;
   ctx.beginPath();
   ctx.moveTo(startX - 25, y);
   ctx.lineTo(startX - 15, y);
   ctx.stroke();
 }
 ctx.fillText(hInput + ' ' + unitVal,startX - 70,startY + drawH/2);

 ctx.font='bold 16px Prompt';
 ctx.fillText('รวม '+total.toLocaleString()+' บาท',20,30);

 document.getElementById('area').innerText='พื้นที่: '+area.toFixed(2)+' ตร.ม.';
 document.getElementById('total').innerText='ราคารวม: '+total.toLocaleString()+' บาท';
}

function saveImage(){
 const canvas=document.getElementById('canvas');
 const link=document.createElement('a');
 link.download='measurement.png';
 link.href=canvas.toDataURL();
 link.click();
}

function shareLine(){
 const canvas=document.getElementById('canvas');
 const url=canvas.toDataURL();
 const lineUrl='https://social-plugins.line.me/lineit/share?url='+encodeURIComponent(url);
 window.open(lineUrl,'_blank');
}
</script>
</body>
</html>
