<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ใบแจ้งราคา</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
 font-family:'Prompt',sans-serif;
 background:linear-gradient(135deg,#ff9800,#ffc107);
 margin:0;padding:10px;
}
.container{
 max-width:520px;
 margin:auto;
 background:#fff;
 padding:15px;
 border-radius:14px;
 box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
h2{text-align:center;font-weight:bold;}

input,select{
 width:100%;
 padding:10px;
 border-radius:8px;
 border:1px solid #ddd;
 margin-bottom:8px;
}

.row{display:flex;gap:10px;}

button{
 width:100%;
 background:#ff9800;
 color:#fff;
 border:none;
 padding:12px;
 border-radius:10px;
}

canvas{
 width:100%;
 margin-top:10px;
 border-radius:10px;
 border:1px solid #eee;
}
</style>
</head>

<body>
<div class="container">

<h2>ใบแจ้งราคา</h2>

<div class="row">
<input type="number" id="width" placeholder="กว้าง">
<input type="number" id="height" placeholder="สูง">
</div>

<select id="unit">
<option value="m">เมตร</option>
<option value="cm">cm</option>
<option value="mm">mm</option>
</select>

<input type="number" id="price" value="150">

<button onclick="drawAll()">สร้างภาพ</button>

<canvas id="canvas" width="600" height="800"></canvas>

</div>

<script>

function convert(v,u){
 if(u==='cm')return v/100;
 if(u==='mm')return v/1000;
 return v;
}

// ===== วาดลูกศร =====
function drawArrow(ctx,x1,y1,x2,y2){
 const head=8;
 const angle=Math.atan2(y2-y1,x2-x1);

 ctx.beginPath();
 ctx.moveTo(x1,y1);
 ctx.lineTo(x2,y2);
 ctx.stroke();

 // หัวลูกศรปลาย
 ctx.beginPath();
 ctx.moveTo(x2,y2);
 ctx.lineTo(x2-head*Math.cos(angle-Math.PI/6),y2-head*Math.sin(angle-Math.PI/6));
 ctx.lineTo(x2-head*Math.cos(angle+Math.PI/6),y2-head*Math.sin(angle+Math.PI/6));
 ctx.closePath();
 ctx.fill();

 // หัวลูกศรต้น
 ctx.beginPath();
 ctx.moveTo(x1,y1);
 ctx.lineTo(x1+head*Math.cos(angle-Math.PI/6),y1+head*Math.sin(angle-Math.PI/6));
 ctx.lineTo(x1+head*Math.cos(angle+Math.PI/6),y1+head*Math.sin(angle+Math.PI/6));
 ctx.closePath();
 ctx.fill();
}

// ===== dimension จริง =====
function drawDimension(ctx,x,y,w,h,textW,textH){

 ctx.strokeStyle='#000';
 ctx.fillStyle='#000';
 ctx.font='12px Prompt';
 ctx.textAlign='center';

 // เส้นล่าง
 let offset=25;
 drawArrow(ctx,x,y+h+offset,x+w,y+h+offset);
 ctx.fillText(textW,x+w/2,y+h+offset+15);

 // เส้นข้าง
 drawArrow(ctx,x-offset,y,x-offset,y+h);

 ctx.save();
 ctx.translate(x-offset-10,y+h/2);
 ctx.rotate(-Math.PI/2);
 ctx.fillText(textH,0,0);
 ctx.restore();
}

// ===== ลายน้ำ =====
function drawWatermark(ctx){
 ctx.save();
 ctx.globalAlpha=0.08;
 ctx.font='bold 40px Prompt';
 ctx.fillStyle='#000';

 for(let y=0;y<800;y+=150){
  for(let x=0;x<600;x+=200){
   ctx.save();
   ctx.translate(x,y);
   ctx.rotate(-Math.PI/4);
   ctx.fillText('ohm snr',0,0);
   ctx.restore();
  }
 }

 ctx.restore();
}

function drawAll(){
 let wIn=+width.value;
 let hIn=+height.value;

 if(!wIn||!hIn){
  alert('กรุณากรอกขนาดให้ถูกต้อง');
  return;
 }

 let unitVal=unit.value;
 let priceVal=+price.value;

 let w=convert(wIn,unitVal);
 let h=convert(hIn,unitVal);
 let area=w*h;
 let total=area*priceVal;

 let ctx=canvas.getContext('2d');
 ctx.clearRect(0,0,600,800);

 // ลายน้ำ
 drawWatermark(ctx);

 // title
 ctx.textAlign='center';
 ctx.font='bold 22px Prompt';
 ctx.fillText('ใบแจ้งราคา',300,30);

 ctx.textAlign='left';
 ctx.fillText(`ขนาด: ${wIn} x ${hIn} ${unitVal}`,20,70);

 // โมเดล
 let scale=200/Math.max(w,h);
 let rw=w*scale, rh=h*scale;

 let x=200,y=120;

 ctx.fillStyle='#ffb74d';
 ctx.fillRect(x,y,rw,rh);
 ctx.strokeRect(x,y,rw,rh);

 // dimension
 drawDimension(ctx,x,y,rw,rh,
  wIn+' '+unitVal,
  hIn+' '+unitVal
 );

 // ===== summary 2 column =====
 let sx=20, sy=420;
 ctx.strokeRect(sx,sy,560,150);

 ctx.font='14px Prompt';

 ctx.fillText('รายละเอียด',sx+10,sy+25);
 ctx.fillText('ราคา/ตร.ม.',sx+300,sy+25);

 ctx.fillText('พื้นที่ '+area.toFixed(2),sx+10,sy+55);
 ctx.fillText(priceVal,sx+300,sy+55);

 ctx.fillText('รวม',sx+10,sy+100);

 ctx.textAlign='right';
 ctx.font='bold 22px Prompt';
 ctx.fillText(total.toLocaleString()+' บาท',sx+540,sy+100);
}

</script>

</body>
</html>
