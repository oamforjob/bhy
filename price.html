<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ใบแจ้งราคา</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root { --primary-color: #2d3436; --accent-color: #e67e22; --bg-color: #f8f9fa; --card-bg: #ffffff; --text-main: #2d3436; --text-sub: #636e72; --error-bg: #fff5f5; --error-border: #ff7675; }
body { font-family: 'Prompt', sans-serif; background: var(--bg-color); margin: 0; padding: 15px; color: var(--text-main); }
.container { max-width: 500px; margin: 0 auto; background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
h2 { text-align: center; margin-top: 0; color: var(--primary-color); font-weight: 600; font-size: 22px; }
.section-title { font-size: 13px; color: var(--accent-color); font-weight: 600; margin: 20px 0 10px 0; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
.form-group { margin-bottom: 15px; }
label { display: block; font-size: 12px; margin-bottom: 5px; color: var(--text-sub); }

input, select { 
  width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #eee; 
  font-family: 'Prompt', sans-serif; font-size: 14px; box-sizing: border-box; 
  outline: none; transition: 0.3s; background: #fafafa;
}
input::placeholder { color: #ccc; font-weight: 300; }
input:focus { border-color: var(--accent-color); background: #fff; }

input.invalid {
  background-color: var(--error-bg) !important;
  border-color: var(--error-border) !important;
}

.row { display: flex; gap: 10px; }
.material-group { display: flex; gap: 8px; margin-bottom: 15px; }
.material-btn { flex: 1; padding: 8px; text-align: center; background: #fff; border: 1px solid #eee; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--text-sub); transition: 0.2s; }
.material-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

.options-list { display: flex; flex-direction: column; gap: 6px; }
.opt { display: grid; grid-template-columns: 30px 1fr 90px 40px; align-items: center; background: #fff; padding: 8px 12px; border-radius: 8px; border: 1px solid #f1f1f1; cursor: pointer; transition: 0.2s; }
.opt.active { border-color: var(--accent-color); background: #fffaf5; }
.opt input[type="number"] { height: 30px; padding: 2px 8px; text-align: right; border-radius: 6px; border: 1px solid #f1f1f1; width: 100%; background: #fafafa; }
.unit-label { font-size: 11px; color: var(--text-sub); text-align: right; margin-left: 5px; }

.button-group { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
button.main-btn { width: 100%; cursor: pointer; padding: 12px; border-radius: 10px; font-weight: 600; border: none; font-family: 'Prompt'; font-size: 15px; }
.btn-generate { background: var(--primary-color); color: #fff; }
.btn-download { background: #fff; color: var(--primary-color); border: 1px solid var(--primary-color) !important; }
#canvas-wrapper { margin-top: 20px; background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
canvas { max-width: 100%; height: auto; display: block; margin: 0 auto; border-radius: 5px; }
</style>
</head>
<body>
<div class="container">
  <h2>Bhy printing</h2>
  <div class="section-title">วัสดุ</div>
  <div class="material-group">
    <div class="material-btn active" onclick="setMaterial(this, 'ไวนิล')">ไวนิล</div>
    <div class="material-btn" onclick="setMaterial(this, 'สติ๊กเกอร์')">สติ๊กเกอร์</div>
    <div class="material-btn" onclick="setMaterial(this, 'กระดาษ')">กระดาษ</div>
  </div>
  <div class="section-title">ขนาดและราคา</div>
  <div class="form-group">
    <div class="row">
      <div style="flex:2">
        <label>กว้าง x สูง</label>
        <div class="row">
          <input type="number" id="width" placeholder="กว้าง" oninput="this.classList.remove('invalid')">
          <input type="number" id="height" placeholder="สูง" oninput="this.classList.remove('invalid')">
        </div>
      </div>
      <div style="flex:1"><label>หน่วย</label><select id="unit"><option value="m">เมตร (m)</option><option value="cm">ซม. (cm)</option><option value="mm">มม. (mm)</option></select></div>
    </div>
  </div>
  <div class="row">
    <div class="form-group" style="flex:1"><label>ราคา/ตร.ม.</label><input type="number" id="price" value="150"></div>
    <div class="form-group" style="flex:1"><label>ค่าจัดส่ง</label><input type="number" id="shipping" placeholder="ฟรี"></div>
  </div>
  <div class="section-title">รายละเอียดเพิ่มเติม</div>
  <div class="options-list">
    <div class="opt" onclick="toggleOpt(this)"><input type="checkbox" id="opt2"> <span>โครงไม้</span> <input type="number" id="p2" placeholder="" oninput="autoCheck(this)" onclick="event.stopPropagation()"> <span class="unit-label">บาท</span></div>
    <div class="opt" onclick="toggleOpt(this)"><input type="checkbox" id="opt3"> <span>พิมพ์ 2 ด้าน</span> <input type="number" id="p3" placeholder="" oninput="autoCheck(this)" onclick="event.stopPropagation()"> <span class="unit-label">บาท</span></div>
    <div class="opt" onclick="toggleOpt(this)"><input type="checkbox" id="opt4"> <span>ธงญี่ปุ่น</span> <input type="number" id="p4" placeholder="" oninput="autoCheck(this)" onclick="event.stopPropagation()"> <span class="unit-label">บาท</span></div>
    <div class="opt" onclick="toggleOpt(this)"><input type="checkbox" id="opt5"> <span>โครงเหล็ก</span> <input type="number" id="p5" placeholder="" oninput="autoCheck(this)" onclick="event.stopPropagation()"> <span class="unit-label">บาท</span></div>
    <div class="opt" onclick="toggleOpt(this)"><input type="checkbox" id="opt6"> <span>เคลือบเงา</span> <input type="number" id="p6" placeholder="" oninput="autoCheck(this)" onclick="event.stopPropagation()"> <span class="unit-label">บาท</span></div>
    <div class="opt" onclick="toggleOpt(this)"><input type="checkbox" id="opt7"> <span>บริการติดตั้ง</span> <input type="number" id="p7" placeholder="" oninput="autoCheck(this)" onclick="event.stopPropagation()"> <span class="unit-label">บาท</span></div>
    <div class="opt" onclick="toggleOpt(this)"><input type="checkbox" id="opt_disc"> <span style="color:#e17055">ส่วนลด</span> <input type="number" id="p_disc" placeholder="" oninput="autoCheck(this)" onclick="event.stopPropagation()"> <span class="unit-label">บาท</span></div>
  </div>
  <div class="button-group">
    <button class="main-btn btn-generate" onclick="drawAll()">คำนวณ</button>
    <button class="main-btn btn-download" onclick="downloadImage()">บันทึกรูปภาพ</button>
  </div>
  <div id="canvas-wrapper"><canvas id="canvas" width="600" height="850"></canvas></div>
</div>

<script>
let selectedMaterial = "ไวนิล";

// เมื่อกรอกตัวเลข -> ติ๊กถูกอัตโนมัติ
function autoCheck(el) {
  const parent = el.closest('.opt');
  const checkbox = parent.querySelector('input[type="checkbox"]');
  if (el.value !== "" && parseFloat(el.value) > 0) {
    checkbox.checked = true;
    parent.classList.add('active');
  } else {
    checkbox.checked = false;
    parent.classList.remove('active');
  }
  drawAll();
}

// เมื่อติ๊กออก -> ล้างข้อมูลตัวเลข
function toggleOpt(el) { 
  const cb = el.querySelector('input[type="checkbox"]'); 
  const input = el.querySelector('input[type="number"]');
  
  if (event.target !== cb) {
    cb.checked = !cb.checked;
  }
  
  if (cb.checked) {
    el.classList.add('active');
  } else {
    el.classList.remove('active');
    input.value = ""; // ล้างข้อมูลเมื่อติ๊กออก
  }
  drawAll(); 
}

function setMaterial(el, val) { 
  document.querySelectorAll('.material-btn').forEach(btn => btn.classList.remove('active')); 
  el.classList.add('active'); 
  selectedMaterial = val; 
  drawAll(); 
}

function drawWatermark(ctx) {
  ctx.save(); ctx.globalAlpha = 0.04; ctx.font = 'bold 30px Prompt'; ctx.fillStyle = '#000'; ctx.rotate(-45 * Math.PI / 180);
  for (let i = -1000; i < 1200; i += 220) { for (let j = -1000; j < 1200; j += 120) { ctx.fillText('Bhy printing', i, j); } }
  ctx.restore();
}

function drawArrow(ctx, x1, y1, x2, y2) {
  const headlen = 10; const angle = Math.atan2(y2 - y1, x2 - x1);
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.lineTo(x2 - headlen * Math.cos(angle - Math.PI / 6), y2 - headlen * Math.sin(angle - Math.PI / 6));
  ctx.moveTo(x2, y2); ctx.lineTo(x2 - headlen * Math.cos(angle + Math.PI / 6), y2 - headlen * Math.sin(angle + Math.PI / 6));
  ctx.stroke();
}

function drawMeasure(ctx, w, h, x, y, realW, realH, unit) {
  ctx.fillStyle = '#fdf2e9'; ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#2d3436'; ctx.lineWidth = 1.2; ctx.strokeRect(x, y, w, h);
  ctx.fillStyle = '#000'; ctx.font = '16px Prompt'; ctx.textAlign = 'center';
  const pad = 35; ctx.strokeStyle = '#2d3436';
  drawArrow(ctx, x + w, y + h + pad, x, y + h + pad); drawArrow(ctx, x, y + h + pad, x + w, y + h + pad); 
  ctx.fillText(`${realW} ${unit}`, x + w / 2, y + h + pad + 25);
  ctx.save(); ctx.translate(x - pad, y + h / 2); ctx.rotate(-Math.PI / 2);
  drawArrow(ctx, h/2, 0, -h/2, 0); drawArrow(ctx, -h/2, 0, h/2, 0);
  ctx.fillText(`${realH} ${unit}`, 0, -15); ctx.restore();
}

function drawAll() {
  const wEl = document.getElementById('width');
  const hEl = document.getElementById('height');
  if (!wEl.value || !hEl.value) return;

  const wIn = wEl.value;
  const hIn = hEl.value;
  const unitVal = document.getElementById('unit').value;
  const priceVal = +document.getElementById('price').value;
  const shipVal = +document.getElementById('shipping').value || 0;
  const discVal = +document.getElementById('p_disc').value || 0;

  let optTotal = 0; let optLabels = [];
  for(let i=2; i<=7; i++) {
    const cb = document.getElementById('opt'+i);
    if(cb && cb.checked) {
      const p = +document.getElementById('p'+i).value || 0;
      optTotal += p; optLabels.push(cb.nextElementSibling.innerText);
    }
  }

  const wM = (unitVal === 'cm') ? wIn/100 : (unitVal === 'mm') ? wIn/1000 : wIn;
  const hM = (unitVal === 'cm') ? hIn/100 : (unitVal === 'mm') ? hIn/1000 : hIn;
  const area = wM * hM;
  const subtotal = area * priceVal;
  const total = subtotal + shipVal + optTotal - discVal;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, 600, 850);
  drawWatermark(ctx);

  ctx.fillStyle = '#2d3436'; ctx.font = 'bold 26px Prompt'; ctx.textAlign = 'center';
  ctx.fillText('ใบสรุปรายละเอียดและราคา', 300, 60);
  ctx.font = '15px Prompt'; ctx.fillStyle = '#636e72';
  ctx.fillText(`วัสดุ: ${selectedMaterial} | ${wIn} x ${hIn} ${unitVal}`, 300, 95);

  const maxDraw = 220; const ratio = maxDraw / Math.max(wM, hM);
  drawMeasure(ctx, wM*ratio, hM*ratio, (600 - wM*ratio)/2 + 20, 160, wIn, hIn, unitVal);

  let y = 520; ctx.textAlign = 'left'; ctx.font = '16px Prompt'; ctx.fillStyle = '#636e72';
  ctx.fillText(`พื้นที่คำนวณ: ${area.toFixed(2)} ตร.ม.`, 70, y);
  
  ctx.fillStyle = '#2d3436'; 
  ctx.fillText(`ค่าวัสดุพิมพ์ (${selectedMaterial}):`, 70, y+45);
  ctx.textAlign = 'right';
  ctx.fillText(`${subtotal.toLocaleString(undefined,{minimumFractionDigits:2})} บาท`, 530, y+45);

  ctx.textAlign = 'left';
  if(optLabels.length > 0) {
    ctx.fillText(`รายละเอียดเพิ่มเติม: ${optLabels.join(', ')}`, 70, y+90);
    ctx.textAlign = 'right';
    ctx.fillText(`+ ${optTotal.toLocaleString()} บาท`, 530, y+90);
  } else {
    ctx.fillText(`ตัวเลือก: เจาะตาไก่`, 70, y+90);
    ctx.textAlign = 'right'; ctx.fillText(`ฟรี`, 530, y+90);
  }

  ctx.textAlign = 'left';
  ctx.fillText(`ค่าจัดส่งสินค้า:`, 70, y+135);
  ctx.textAlign = 'right';
  ctx.fillText(shipVal === 0 ? "ฟรี" : `+ ${shipVal.toLocaleString()} บาท`, 530, y+135);

  if(document.getElementById('opt_disc').checked && discVal > 0) {
    ctx.textAlign = 'left'; ctx.fillStyle = '#e17055'; ctx.fillText(`ส่วนลดพิเศษ:`, 70, y+180);
    ctx.textAlign = 'right'; ctx.fillText(`- ${discVal.toLocaleString()} บาท`, 530, y+180);
    y += 45;
  }

  ctx.fillStyle = '#2d3436'; ctx.fillRect(50, y+200, 500, 70);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 24px Prompt'; ctx.textAlign = 'left';
  ctx.fillText('ยอดรวมทั้งสิ้น', 85, y+243);
  ctx.textAlign = 'right';
  ctx.fillText(`${total.toLocaleString()} บาท`, 515, y+243);
}

function downloadImage() {
  const wEl = document.getElementById('width');
  const hEl = document.getElementById('height');
  if (!wEl.value || !hEl.value) {
    if (!wEl.value) wEl.classList.add('invalid');
    if (!hEl.value) hEl.classList.add('invalid');
    alert("กรุณากรอกขนาดให้ถูกต้อง");
    return;
  }
  const link = document.createElement('a');
  link.download = `Bhy-printing-quote.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
