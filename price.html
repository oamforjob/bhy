<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ใบแจ้งราคา</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
 font-family:'Prompt',sans-serif;
 background:linear-gradient(135deg,#ff9800,#ffc107);
 margin:0;padding:10px;
}
.container{
 max-width:520px;
 margin:auto;
 background:#fff;
 padding:15px;
 border-radius:14px;
 box-shadow:0 8px 20px rgba(0,0,0,0.2);
}
h2{text-align:center;font-size:22px;font-weight:bold;}

.form-group{margin-bottom:12px;}
label{font-size:13px;display:block;margin-bottom:4px;}
input,select{
 width:100%;
 padding:12px;
 border-radius:10px;
 border:1px solid #ddd;
 font-size:15px;
 box-sizing:border-box;
}

.row{display:flex;gap:10px;}

.opt{
 display:grid;
 grid-template-columns:30px 1fr 100px 40px;
 align-items:center;
 gap:6px;
 background:#fff8e1;
 padding:8px;
 border-radius:8px;
 margin-bottom:6px;
 border-bottom:1px solid #ddd;
}
.opt.active{background:#ffe082;}

button{
 width:100%;
 background:#ff9800;
 color:#fff;
 border:none;
 padding:12px;
 border-radius:10px;
 margin-top:8px;
 font-weight:600;
}

canvas{
 width:100%;
 margin-top:15px;
 border-radius:10px;
 border:1px solid #eee;
}

/* ===== ERROR STYLE ===== */
.input-error{
 border:2px solid #ff3b30 !important;
 background:#fff0f0;
}

@keyframes shake{
 0%{transform:translateX(0);}
 25%{transform:translateX(-5px);}
 50%{transform:translateX(5px);}
 75%{transform:translateX(-5px);}
 100%{transform:translateX(0);}
}
.shake{
 animation:shake 0.3s;
}
</style>
</head>

<body>
<div class="container">

<h2>ใบแจ้งราคา</h2>

<div class="form-group">
<label>ขนาด</label>
<div class="row">
<input type="number" id="width" placeholder="กว้าง">
<input type="number" id="height" placeholder="สูง">
</div>
</div>

<div class="form-group">
<label>หน่วย</label>
<select id="unit">
<option value="m">เมตร</option>
<option value="cm">เซนติเมตร</option>
<option value="mm">มิลลิเมตร</option>
</select>
</div>

<div class="form-group">
<label>ราคา / ตร.ม.</label>
<input type="number" id="price" value="150">
</div>

<div class="form-group">
<label>รายการเสริม</label>
<div style="color:green;font-size:13px;">🟢 เจาะตาไก่ ฟรี</div>

<div class="opt" onclick="toggleOpt(this)"><input type="checkbox" id="opt1"><span>โครงไม้</span><input type="number" id="p1"><span>บาท</span></div>
<div class="opt" onclick="toggleOpt(this)"><input type="checkbox" id="opt2"><span>พิมพ์ 2 ด้าน</span><input type="number" id="p2"><span>บาท</span></div>
<div class="opt" onclick="toggleOpt(this)"><input type="checkbox" id="opt3"><span>ธงญี่ปุ่น</span><input type="number" id="p3"><span>บาท</span></div>
<div class="opt" onclick="toggleOpt(this)"><input type="checkbox" id="opt4"><span>ฐาน/โครงเหล็ก</span><input type="number" id="p4"><span>บาท</span></div>
<div class="opt" onclick="toggleOpt(this)"><input type="checkbox" id="opt5"><span>เคลือบลามิเนต</span><input type="number" id="p5"><span>บาท</span></div>
<div class="opt" onclick="toggleOpt(this)"><input type="checkbox" id="opt6"><span>บริการติดตั้ง</span><input type="number" id="p6"><span>บาท</span></div>
</div>

<div class="form-group">
<label>ค่าส่ง</label>
<input type="number" id="shipping" placeholder="0">
</div>

<div class="form-group">
<label>ส่วนลด</label>
<input type="number" id="discount" placeholder="0">
</div>

<button onclick="drawAll()">สร้างภาพ</button>

<canvas id="canvas" width="600" height="650"></canvas>

</div>

<script>

// ===== POPUP =====
function showPopup(msg){
 const div=document.createElement('div');
 div.innerText=msg;
 div.style.position='fixed';
 div.style.top='50%';
 div.style.left='50%';
 div.style.transform='translate(-50%,-50%)';
 div.style.background='#ff9800';
 div.style.color='#fff';
 div.style.padding='15px 20px';
 div.style.borderRadius='10px';
 div.style.zIndex='9999';
 document.body.appendChild(div);
 setTimeout(()=>div.remove(),2000);
}

// ===== ERROR =====
function showInputError(input){
 input.classList.add('input-error','shake');
 setTimeout(()=>input.classList.remove('shake'),300);
}
function clearInputError(input){
 input.classList.remove('input-error');
}

// ===== CORE =====
function convert(v,u){
 if(u==='cm')return v/100;
 if(u==='mm')return v/1000;
 return v;
}

function getExtras(){
 let sum=0;
 let list=[];

 for(let i=1;i<=6;i++){
  let c=document.getElementById('opt'+i);
  let name=c.parentElement.children[1].innerText;
  let p=parseFloat(document.getElementById('p'+i).value)||0;

  if(c.checked){
   sum+=p;
   list.push(name+' '+p+' บาท');
  }
 }

 if(list.length===0){
  list.push('เจาะตาไก่ ฟรี');
 }

 return {sum,list};
}

function toggleOpt(el){
 const checkbox=el.querySelector('input[type=checkbox]');
 checkbox.checked=!checkbox.checked;
 el.classList.toggle('active',checkbox.checked);
}

function drawMeasure(ctx,w,h,x,y,realW,realH,unit){
 ctx.fillStyle='rgba(255,152,0,0.6)';
 ctx.fillRect(x,y,w,h);
 ctx.strokeRect(x,y,w,h);

 ctx.textAlign='center';
 ctx.fillStyle='#000';
 ctx.fillText(realW+' '+unit,x+w/2,y+h+30);

 ctx.save();
 ctx.translate(x-30,y+h/2);
 ctx.rotate(-Math.PI/2);
 ctx.fillText(realH+' '+unit,0,0);
 ctx.restore();
}

function drawAll(){
 const wInput=width;
 const hInput=height;

 const wIn=+wInput.value;
 const hIn=+hInput.value;

 clearInputError(wInput);
 clearInputError(hInput);

 if(!wIn || !hIn || wIn<=0 || hIn<=0){
  if(!wIn || wIn<=0) showInputError(wInput);
  if(!hIn || hIn<=0) showInputError(hInput);

  showPopup('กรุณากรอกขนาดให้ถูกต้อง');
  return;
 }

 const unitVal=unit.value;
 const priceVal=+price.value;
 const shippingVal=+shipping.value||0;
 const discountVal=+discount.value||0;

 const w=convert(wIn,unitVal);
 const h=convert(hIn,unitVal);
 const area=w*h;

 const extraData=getExtras();
 const total=(area*priceVal)+extraData.sum+shippingVal-discountVal;

 const ctx=canvas.getContext('2d');
 ctx.clearRect(0,0,600,650);

 ctx.textAlign='center';
 ctx.font='bold 22px Prompt';
 ctx.fillText('ใบแจ้งราคา',300,30);

 ctx.textAlign='left';
 ctx.fillText(`ขนาด: ${wIn} x ${hIn} ${unitVal}`,20,70);

 const scale=200/Math.max(w,h);
 drawMeasure(ctx,w*scale,h*scale,200,120,wIn,hIn,unitVal);

 // ===== สรุป =====
 let x=20,y=350;
 ctx.strokeRect(x,y,260,200);

 ctx.fillText('สรุปรายการ',x+10,y+25);
 ctx.fillText('ราคางาน: '+(area*priceVal).toLocaleString(),x+10,y+60);

 ctx.fillText('บริการเสริม:',x+10,y+85);
 let ey=y+105;
 extraData.list.forEach(item=>{
  ctx.fillText('- '+item,x+10,ey);
  ey+=18;
 });

 ctx.fillText('ค่าส่ง: '+shippingVal.toLocaleString(),x+10,ey+10);
 ctx.fillText('ส่วนลด: -'+discountVal.toLocaleString(),x+10,ey+30);

 ctx.textAlign='center';
 ctx.font='bold 20px Prompt';
 ctx.fillText('ยอดสุทธิ',x+130,ey+70);

 ctx.font='bold 24px Prompt';
 ctx.fillText(total.toLocaleString()+' บาท',x+130,ey+100);
}

</script>

</body>
</html>
