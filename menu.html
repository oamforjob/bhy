<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.H.Y การพิมพ์ - ระบบจัดการข้อมูล</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #2c3e50;
        }

        .container {
            background-color: #ffffff;
            padding: 50px 40px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px;
            text-align: center;
            border-top: 8px solid #003366; /* สีน้ำเงินกรมท่าแบบองค์กร */
        }

        .header {
            margin-bottom: 40px;
        }

        .logo {
            width: 110px;
            height: auto;
            margin-bottom: 20px;
        }

        .company-name {
            font-size: 1.7rem;
            font-weight: 700;
            color: #003366;
            margin: 0;
            letter-spacing: 1px;
        }

        .divider {
            height: 3px;
            width: 60px;
            background-color: #c5a059; /* สีทองหม่นเพิ่มความพรีเมียม */
            margin: 20px auto;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-item {
            margin-bottom: 12px;
        }

        .menu-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #333;
            background-color: #fafafa;
            padding: 18px 25px;
            font-size: 1.1rem;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .menu-link:hover {
            background-color: #003366;
            color: #ffffff;
            border-color: #003366;
            box-shadow: 0 4px 12px rgba(0, 51, 102, 0.2);
        }

        .arrow {
            font-size: 0.9rem;
            transition: transform 0.3s ease;
        }

        .menu-link:hover .arrow {
            transform: translateX(5px);
        }

        .footer-info {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <img src="https://lh3.googleusercontent.com/d/14QglsWS86uC_r5ZWYLPbx9Vt7fDE7n5D" alt="B.H.Y Logo" class="logo">
            <h1 class="company-name">B.H.Y การพิมพ์</h1>
            <div class="divider"></div>
        </header>

        <nav>
            <ul class="menu-list">
                <li class="menu-item">
                    <a href="https://oamforjob.github.io/bhy/po.html" class="menu-link" target="_self">
                        <span>ใบสั่งซื้อสินค้า (PO)</span>
                        <span class="arrow">▶</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="https://oamforjob.github.io/bhy/model.html" class="menu-link" target="_self">
                        <span>รูปแบบผลิตภัณฑ์ (Model)</span>
                        <span class="arrow">▶</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="https://oamforjob.github.io/bhy/price.html" class="menu-link" target="_self">
                        <span>ข้อมูลราคา (Price)</span>
                        <span class="arrow">▶</span>
                    </a>
                </li>
            </ul>
        </nav>

        <footer class="footer-info">
            © 2026 B.H.Y Printing Services
        </footer>
    </div>

</body>
</html>
