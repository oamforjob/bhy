<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B.H.Y การพิมพ์ - เมนูหลัก</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8f9fa; /* สีเทาอ่อนเรียบหรู */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px; /* โค้งมนเล็กน้อยพองาม */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); /* เงาบางๆ ให้ดูมีมิติ */
            width: 100%;
            max-width: 450px;
            text-align: center;
            border-top: 6px solid #1a3a5f; /* เส้นขอบด้านบนสีน้ำเงินเข้ม */
        }

        /* --- ส่วนหัว --- */
        .header {
            margin-bottom: 30px;
        }

        .logo {
            width: 100px;
            height: auto;
            margin-bottom: 15px;
            /* ปรับแต่งภาพเล็กน้อยให้คมชัด */
        }

        .company-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a3a5f;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .divider {
            height: 2px;
            width: 50px;
            background-color: #d4af37; /* สีทองเสริมความหรูหรา */
            margin: 15px auto;
        }

        /* --- ส่วนเมนู --- */
        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-item {
            margin-bottom: 15px;
        }

        .menu-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #1a3a5f;
            background-color: #fff;
            padding: 16px 25px;
            font-size: 1.1rem;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            transition: all 0.2s ease-in-out;
        }

        .menu-link:hover {
            background-color: #1a3a5f;
            color: #ffffff;
            border-color: #1a3a5f;
            transform: translateX(5px); /* เลื่อนขวาเล็กน้อยเมื่อชี้ */
        }

        .arrow-icon {
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .menu-link:hover .arrow-icon {
            opacity: 1;
        }

        /* Footer เล็กๆ */
        .footer-text {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #999;
        }

    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <img src="https://lh3.googleusercontent.com/d/14QglsWS86uC_r5ZWYLPbx9Vt7fDE7n5D" alt="Logo" class="logo">
            <h1 class="company-name">B.H.Y การพิมพ์</h1>
            <div class="divider"></div>
        </header>

        <nav>
            <ul class="menu-list">
                <li class="menu-item">
                    <a href="https://github.com/oamforjob/bhy/po.html" class="menu-link" target="_self">
                        <span>ใบสั่งซื้อสินค้า (PO)</span>
                        <span class="arrow-icon">▶</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="https://github.com/oamforjob/bhy/model.html" class="menu-link" target="_self">
                        <span>รูปแบบผลิตภัณฑ์ (Model)</span>
                        <span class="arrow-icon">▶</span>
                    </a>
                </li>
                <li class="menu-item">
                    <a href="https://github.com/oamforjob/bhy/price.html" class="menu-link" target="_self">
                        <span>รายการอัตราค่าบริการ (Price)</span>
                        <span class="arrow-icon">▶</span>
                    </a>
                </li>
            </ul>
        </nav>

        <p class="footer-text">© 2026 B.H.Y Printing Services</p>
    </div>

</body>
</html>
